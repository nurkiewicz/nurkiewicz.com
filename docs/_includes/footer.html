<footer
  aria-label="Site Info"
  class="d-flex flex-column justify-content-center text-muted flex-lg-row justify-content-lg-between align-items-lg-center pb-lg-3"
>
  <p>
    © <time>{{ "now" | date: "%Y" }}</time>
    <a href="{{ site.social.links[0] }}">{{ site.social.name }}</a>.
    <a id="edit-page" href="#" hidden>Edit this page</a>
  </p>

  <p>
    Using the
    <a href="https://github.com/cotes2020/jekyll-theme-chirpy" target="_blank" rel="noopener">Chirpy</a>
    theme for
    <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>.
  </p>
</footer>

<script>
  (() => {
    const path = window.location.pathname;
    if (/^\/\d{4}\/\d{2}\//.test(path)) return;

    const markdownPages = new Set(["about", "book", "guest", "notes", "podcast", "rxjava", "talks"]);
    const slug = path.replace(/^\//, "").replace(/\.html$/, "");
    const source = path === "/"
      ? "index.md"
      : path === "/slides/"
        ? "slides/index.md"
        : markdownPages.has(slug) ? `${slug}.md` : undefined;
    if (!source) return;

    const link = document.getElementById("edit-page");
    link.href = `https://github.com/{{ site.repository }}/edit/master/docs/${source}`;
    link.hidden = false;
  })();
</script>
